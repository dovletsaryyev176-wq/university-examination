{% extends 'base.html' %}

{% block content %}
<div class="main-card shadow-sm p-4 bg-white rounded">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0">Ulanyjylaryň sanawy</h2>
        <a href="{{ url_for('users.create') }}" class="btn btn-primary px-4">
            <i class="bi bi-person-plus"></i> + Täze ulanyjy goşmak
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light text-secondary">
                <tr>
                    <th style="width: 50px;">ID</th>
                    <th>Ulanyjynyň doly ady(FAA)</th>
                    <th>Ulanyjy ady</th>
                    <th class="text-end px-4">Amallar</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td><span class="badge bg-light text-dark border">{{ user.id }}</span></td>
                    <td><strong>{{ user.full_name }}</strong></td>
                    <td><code class="text-primary">{{ user.username }}</code></td>
                    <td class="text-end px-4">
                        <a href="{{ url_for('users.edit', id=user.id) }}" class="btn btn-sm btn-outline-warning me-1">
                            Üýtgetmek
                        </a>

                        <form action="{{ url_for('users.delete', id=user.id) }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Ulanyjyny ýok etmelimi?')">
                                Ýok etmek
                            </button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="text-center py-4 text-muted">
                        Heniz ulanyjy ýok.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
