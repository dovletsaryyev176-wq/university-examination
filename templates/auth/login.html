{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="main-card">
            <h3 class="text-center mb-4">Ulgama girmek</h3>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Ulanyjy ady</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Gizlin belgisi</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Ulgama girmek</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
